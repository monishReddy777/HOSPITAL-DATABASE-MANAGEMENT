{% extends "base.html" %}
{% block title %}Doctors{% endblock %}
{% block content %}
<header>
    <h1>Hospital Staff</h1>
</header>

<div class="data-card">
    <h2>Active Doctors</h2>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Specialty</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            {% for doctor in doctors %}
            <tr>
                <td>{{ doctor.name }}</td>
                <td>{{ doctor.specialty }}</td>
                <td>{{ doctor.email }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
